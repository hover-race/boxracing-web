<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Desert Scene</title>
    <link rel="stylesheet" href="/css/examples.css?ver=1.0.0" />
    <script src="/js/examples.js?ver=1.1.1"></script>
    <script src="/lib/enable3d/enable3d.framework.0.25.4.min.js"></script>
  </head>

  <body>
    <script>
      // Make ENABLE3D objects available globally before modules load
      const { Project, Scene3D, PhysicsLoader, THREE } = ENABLE3D;
      window.THREE = THREE;
      window.Scene3D = Scene3D;
      window.Project = Project;
      window.PhysicsLoader = PhysicsLoader;
    </script>

    <script type="module">
      import { DesertScene } from './js/desertScene.js';
      
      PhysicsLoader('/lib/ammo/kripken', () => new Project({ scenes: [DesertScene], antialias: true }))
    </script>
  </body>
</html>
